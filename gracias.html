
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mensaje enviado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .box h1 {
      color: #1e2a3a;
      margin-bottom: 10px;
    }

    .box p {
      color: #555;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #1e2a3a;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #2f4158;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>¡Mensaje enviado!</h1>
    <p>Gracias por contactarnos. A la brevedad nos estaremos comunicando con usted.</p>

    <a href="https://estudiogaradeallende.com" class="btn">
      Volver al inicio
    </a>
  </div>

</body>
</html>
